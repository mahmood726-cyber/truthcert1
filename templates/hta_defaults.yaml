hta_defaults:
  perspective_primary: "health_system"
  perspectives_supported: ["health_system","societal_optional","donor_program"]
  discounting:
    costs: 0.03
    outcomes: 0.03
    sensitivity_grid: [0.00, 0.03, 0.05]
  cost_year:
    value: null
    ne_code: "NE_COST_YEAR"
    note: "Set to the local price year for all LCU costs."
  currency_display:
    mode: "LCU"  # always present LCU; can show USD as secondary conversion if exchange_rate provided
    secondary: "USD_optional"
  wtp_thresholds:
    mode: "policy_defined"
    default: null
    note: "No universal threshold is assumed; provide local decision threshold(s) or use affordability + net health benefit framing."
    sensitivity_only_reference:
      enabled: false
      options:
        - name: "0.5x_GDPpc"
        - name: "1x_GDPpc"
        - name: "3x_GDPpc"
      note: "Disabled by default due to well-known criticism of GDP-multiple thresholds."
  uncertainty_gating_by_truthcert:
    STABLE:
      allow_full_hta: true
      allow_psa: true
      allow_voi: true
    MODERATE:
      allow_full_hta: true
      allow_psa: true
      allow_voi: true
      caution: "Widen parameter uncertainty; emphasize regret & affordability."
    EXPOSED:
      allow_full_hta: "limited"
      allow_psa: true
      allow_voi: true
      caution: "HTA outputs must be scenario-bounded and highlight structural uncertainty."
    UNCERTAIN:
      allow_full_hta: false
      allow_psa: "only for affordability stress-tests"
      allow_voi: true
      caution: "Refuse precision: HTA outputs restricted to bounds, worst-case, and value-of-research."
